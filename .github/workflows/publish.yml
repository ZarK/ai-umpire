name: publish.yml

on:
  push:
    tags:
      - "publish-*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/publish-')
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.0.4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@11.0.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify tag is reachable from main
        run: |
          git fetch --no-tags origin main
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$tag_commit" origin/main

      - name: Run release check
        run: pnpm run release:check

      - name: Install npm 11.15.0
        run: |
          npm install -g npm@11.15.0 --ignore-scripts
          test "$(npm --version)" = "11.15.0"

      - name: Publish package
        run: npm stage publish . --access public --ignore-scripts
